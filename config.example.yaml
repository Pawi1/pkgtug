server:
  listen: ":8080"
  base_url: "https://tug.internal.example.com"
  data_dir: "/var/lib/pkgtug"
  worker_secret: "change-me-to-a-random-secret"
  cors_origins:
    - "*"   # allow all origins (required for GitHub Pages browser UI)
    # or restrict: - "https://youruser.github.io"
  webhook_cooldown: "10s"   # min gap between webhook fetches per package (default 10s)
  # max_upload_size: "100MB"  # optional — limit per-file upload size (e.g. Cloudflare Tunnel cap)
  # keep_versions: 5          # optional — old versions to retain per package; 0 = unlimited (default)

telegram:
  bot_token: ""
  chat_id: ""

packages:
  - name: vnet-mcp
    git_url: git@gitlab.example.com:user/vnet-mcp.git
    source_url: https://gitlab.example.com/user/vnet-mcp   # optional: shown in manifest and browser UI
    local_clone: /data/repos/vnet-mcp
    version_source:
      type: tag
      pattern: "*-stable"
    # pre_build_command: "./scripts/gen.sh"   # optional: runs in clone dir before build_command
    build_command: "make build-binary"
    poll_interval: "5m"   # optional: check for new versions every 5 min (backup for missed webhooks)
    binaries:
      - component: mcp
        path: mcp/dist/vcn-mcp
      - component: ui
        path: ui/dist/vcn-ui

  - name: myservice
    git_url: git@github.com:user/myservice.git
    source_url: https://github.com/user/myservice   # optional: project/repo URL exposed in manifest
    # download_token: "change-me"                   # optional: require Bearer token for binary downloads
    local_clone: /data/repos/myservice
    version_source:
      type: branch
      name: main
    # pre_build_command: "go generate ./..."  # optional: e.g. generate code before building
    build_command: "go build -o dist/myservice ./cmd/myservice"
    binaries:
      - component: server
        path: dist/myservice

  - name: myapp-appimage
    direct_push: true   # no git/build — accept binaries via POST /tug/repo/<name>/push
    source_url: https://github.com/user/myapp
    # download_token: "change-me"   # optional: protect downloads with a token
    # keep_versions: 3              # optional: per-package override for version retention
